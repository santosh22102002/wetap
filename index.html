<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TADS Telegram Ads Test</title>

<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- TADS Widget Script -->
<script src="https://w.tads.me/widget.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#watchAd{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:16px 28px;
  font-size:18px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<h2>Test TADS Fullscreen Ads</h2>

<button id="watchAd">Watch Ad</button>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const WIDGET_ID = "9534";
  const BTN_ID = "watchAd";

  const adController = window.tads.init({
    widgetId: WIDGET_ID,
    type: "fullscreen",
    debug: true, // keep true for testing
    onShowReward: (result) => {
      console.log("Ad watched:", result);
      alert("Ad finished!");
    },
    onAdsNotFound: () => {
      console.log("No ads available");
      alert("No ads found");
    }
  });

  document.getElementById(BTN_ID).addEventListener("click", () => {
    adController.showAd().catch(err => {
      console.log("Ad error:", err);
    });
  });

});
</script>

</body>
</html>
