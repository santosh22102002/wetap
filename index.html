<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1UP PLAY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #242424;
            --text-main: #FFFFFF;
            --text-dim: #D1D1D1;
            --accent-yellow: #FFFF00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent body scroll, handle inside containers */
        }

        /* Overlays */
        #loading-screen, #block-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        #block-screen { display: none; }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent-yellow);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Main App Container */
        #app-container {
            display: none; /* Hidden until loaded */
            flex-direction: column;
            height: 100%;
            padding: 20px;
        }

        /* Header Section */
        header { margin-bottom: 20px; }
        
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .highlight { color: var(--accent-yellow); }
        
        h2 { font-size: 28px; font-weight: 700; color: var(--text-dim); margin-bottom: 5px; }
        h3 { font-size: 16px; font-weight: 700; color: var(--text-dim); margin-bottom: 10px; }
        h4 { font-size: 14px; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }
        
        .ticket-count-text {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Ticket Grid */
        .ticket-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 80px; /* Space for bottom button */
        }
        
        .ticket-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            text-align: center;
        }
        
        .ticket-item {
            font-size: 14px;
            color: var(--text-dim);
            font-family: monospace;
        }

        /* Bottom Button */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, var(--bg-color) 70%, transparent);
        }

        button {
            width: 100%;
            background-color: var(--accent-yellow);
            color: #000;
            border: none;
            border-radius: 30px;
            padding: 15px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="margin-top: 15px; font-weight: bold;">Loading Data...</p>
    </div>

    <div id="block-screen">
        <h2 style="color: var(--accent-yellow); margin-bottom: 10px;">Mobile Only</h2>
        <p>This mini-app is only available on the Telegram Mobile App.</p>
    </div>

    <div id="app-container">
        <header>
            <h1><span class="highlight">1UP</span> PLAY</h1>
            <h2 id="timer">0D:00H:00M:00S</h2>
            <h3>WIN MLBB WEEKLY DIAMOND PASS</h3>
            <h4 id="previous-winners">EX-WINNER ******, ******, ******</h4>
            <p class="ticket-count-text">🎟️ <span id="ticket-count">0</span></p>
        </header>

        <div class="ticket-container">
            <div class="ticket-grid" id="ticket-grid">
                </div>
        </div>

        <div class="bottom-bar">
            <button id="claim-btn" onclick="handleClaim()">CLAIM TICKET(ADS)</button>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        const SUPABASE_URL = 'https://bmimlksvqowgqoqheyin.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ntMDMo4JnbSjJYSbaQXp-Q_rN0fYtVD';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const tg = window.Telegram.WebApp;
        let userId = null;
        let tickets = [];
        let cooldownTimer = null;
        const COOLDOWN_MINUTES = 30;

        // --- 2. INITIALIZATION ---
        async function initApp() {
            tg.expand();
            
            // Block non-mobile platforms
            const platform = tg.platform;
            if (['tdesktop', 'web', 'macos', 'unknown'].includes(platform)) {
                document.getElementById('loading-screen').style.display = 'none';
                document.getElementById('block-screen').style.display = 'flex';
                return;
            }

            // Get user ID (Fallback for testing outside TG)
            userId = tg.initDataUnsafe?.user?.id || 'test_user_123';

            // Start Clock
            startTimer();

            // Fetch Data
            await fetchAppData();

            // Show App
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
        }

        // --- 3. DATA FETCHING ---
        async function fetchAppData() {
            try {
                // Fetch user tickets
                const { data: userTickets, error: ticketError } = await supabase
                    .from('tickets')
                    .select('ticket_code, created_at')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false });

                if (userTickets) {
                    tickets = userTickets.map(t => t.ticket_code);
                    updateTicketUI();
                    checkCooldown(userTickets[0]?.created_at);
                }

                // Fetch previous winners
                const { data: winners } = await supabase
                    .from('winners')
                    .select('ticket_code')
                    .order('created_at', { ascending: false })
                    .limit(3);

                if (winners && winners.length > 0) {
                    const winnerText = winners.map(w => w.ticket_code).join(', ');
                    document.getElementById('previous-winners').innerText = `EX-WINNER ${winnerText}`;
                }
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        // --- 4. TICKET & COOLDOWN LOGIC ---
        function checkCooldown(lastTicketTime) {
            if (!lastTicketTime) return;
            
            const lastClaim = new Date(lastTicketTime).getTime();
            const now = new Date().getTime();
            const diffMs = now - lastClaim;
            const diffMins = Math.floor(diffMs / 60000);

            if (diffMins < COOLDOWN_MINUTES) {
                disableClaimButton(lastClaim);
            }
        }

        function disableClaimButton(lastClaimTime) {
            const btn = document.getElementById('claim-btn');
            btn.disabled = true;
            
            if(cooldownTimer) clearInterval(cooldownTimer);

            cooldownTimer = setInterval(() => {
                const now = new Date().getTime();
                const timeLeft = (lastClaimTime + (COOLDOWN_MINUTES * 60000)) - now;

                if (timeLeft <= 0) {
                    clearInterval(cooldownTimer);
                    btn.disabled = false;
                    btn.innerText = "CLAIM TICKET(ADS)";
                } else {
                    const m = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((timeLeft % (1000 * 60)) / 1000);
                    btn.innerText = `COOLDOWN: ${m}m ${s}s`;
                }
            }, 1000);
        }

        function generateTicketCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }

        async function handleClaim() {
            // Trigger Ad logic here (e.g., Telegram Ads API if applicable)
            // For now, we simulate watching an ad:
            tg.showPopup({
                title: 'Watch Ad',
                message: 'Simulating playing an ad...',
                buttons: [{type: 'ok'}]
            }, async () => {
                
                // Ad completed, generate ticket
                const newTicket = generateTicketCode();
                
                // Save to Supabase
                const { error } = await supabase
                    .from('tickets')
                    .insert([{ user_id: userId, ticket_code: newTicket }]);

                if (error) {
                    tg.showAlert("Failed to claim ticket. Try again.");
                    return;
                }

                // Update UI
                tickets.unshift(newTicket);
                updateTicketUI();
                disableClaimButton(new Date().getTime());
                tg.HapticFeedback.notificationOccurred('success');
            });
        }

        // --- 5. UI UPDATES ---
        function updateTicketUI() {
            document.getElementById('ticket-count').innerText = tickets.length;
            const grid = document.getElementById('ticket-grid');
            grid.innerHTML = '';
            
            tickets.forEach(ticket => {
                const div = document.createElement('div');
                div.className = 'ticket-item';
                div.innerText = ticket;
                grid.appendChild(div);
            });
        }

        // --- 6. TIMER LOGIC ---
        function startTimer() {
            setInterval(() => {
                const now = new Date();
                // Get next Monday at 00:00:00 UTC
                let nextMonday = new Date();
                nextMonday.setUTCHours(0,0,0,0);
                nextMonday.setUTCDate(now.getUTCDate() + ((7 - now.getUTCDay() + 1) % 7 || 7));

                const diff = nextMonday - now;

                if (diff > 0) {
                    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((diff % (1000 * 60)) / 1000);

                    document.getElementById('timer').innerText = 
                        `${d}D:${h.toString().padStart(2,'0')}H:${m.toString().padStart(2,'0')}M:${s.toString().padStart(2,'0')}S`;
                } else {
                    document.getElementById('timer').innerText = "DRAWING...";
                }
            }, 1000);
        }

        // Boot up
        window.onload = initApp;

    </script>
</body>
</html>
