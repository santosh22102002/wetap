<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Lottery</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURATION (Replace with yours)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
            authDomain: "upwebapp-19b3a.firebaseapp.com",
            projectId: "upwebapp-19b3a",
            storageBucket: "upwebapp-19b3a.firebasestorage.app",
            messagingSenderId: "746730266775",
            appId: "1:746730266775:web:ae3ef6b81d83cd9427c9d2"
        };

        const ADSGRAM_BLOCK_ID = "YOUR_ADSGRAM_BLOCK_ID"; // Get this from Adsgram.ai

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ==========================================
        // TELEGRAM & USER SETUP
        // ==========================================
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe?.user?.id?.toString() || "test_user_123";
        const maxTickets = 50;
        const cooldownMs = 10 * 60 * 1000; // 10 minutes

        let userTickets = [];
        let lastClaimTime = 0;
        let todayDateStr = new Date().toISOString().split('T')[0];

        // UI Elements
        const statusEl = document.getElementById('lottery-status');
        const timerEl = document.getElementById('lottery-timer');
        const tableBody = document.getElementById('ticket-table-body');
        const claimBtn = document.getElementById('claim-btn');
        const cooldownMsg = document.getElementById('cooldown-msg');

        // Initialize Adsgram Controller
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID }) : null;

        // ==========================================
        // SCHEDULE & TIMER LOGIC
        // ==========================================
        function updateSchedule() {
            const now = new Date();
            const hour = now.getHours();
            let state = "";
            let targetTime = new Date(now);

            if (hour >= 17 || hour < 12) {
                state = "OPEN";
                statusEl.innerText = "Lottery is OPEN";
                if (hour >= 17) targetTime.setDate(targetTime.getDate() + 1);
                targetTime.setHours(12, 0, 0, 0);
            } else if (hour >= 12 && hour < 14) {
                state = "CLOSED";
                statusEl.innerText = "Lottery CLOSED. Calculating results...";
                targetTime.setHours(14, 0, 0, 0);
                claimBtn.disabled = true;
            } else {
                state = "RESULTS";
                statusEl.innerText = "Results are OUT! Waiting for next round...";
                targetTime.setHours(17, 0, 0, 0);
                claimBtn.disabled = true;
            }

            const diff = targetTime - now;
            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            
            timerEl.innerText = `Time left: ${h}h ${m}m ${s}s`;

            if (state === "OPEN") checkCooldown();
        }
        setInterval(updateSchedule, 1000);

        // ==========================================
        // DATABASE & DATA HANDLING
        // ==========================================
        async function loadUserData() {
            const docRef = doc(db, "users", userId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                if (data.date === todayDateStr) {
                    userTickets = data.tickets || [];
                    lastClaimTime = data.lastClaimTime || 0;
                } else {
                    userTickets = [];
                    lastClaimTime = 0;
                    await setDoc(docRef, { date: todayDateStr, tickets: [], lastClaimTime: 0 });
                }
            } else {
                await setDoc(docRef, { date: todayDateStr, tickets: [], lastClaimTime: 0 });
            }
            renderTable();
            checkCooldown();
        }

        function renderTable() {
            tableBody.innerHTML = "";
            userTickets.forEach((ticket, index) => {
                const row = `<tr><td>${index + 1}</td><td>${ticket}</td></tr>`;
                tableBody.innerHTML += row;
            });
        }

        function checkCooldown() {
            if (userTickets.length >= maxTickets) {
                claimBtn.disabled = true;
                claimBtn.innerText = "Max Tickets Reached";
                cooldownMsg.innerText = "You have claimed 50/50 tickets today.";
                return;
            }

            const now = Date.now();
            const timePassed = now - lastClaimTime;

            if (timePassed < cooldownMs) {
                claimBtn.disabled = true;
                const timeLeft = Math.ceil((cooldownMs - timePassed) / 1000 / 60);
                claimBtn.innerText = "Cooldown Active";
                cooldownMsg.innerText = `Wait ${timeLeft} mins for next ticket.`;
            } else {
                claimBtn.disabled = false;
                claimBtn.innerText = "Watch Ad to Claim Ticket";
                cooldownMsg.innerText = `${userTickets.length}/${maxTickets} tickets claimed today.`;
            }
        }

        // ==========================================
        // AD & CLAIM LOGIC (ADSGRAM)
        // ==========================================
        window.claimTicket = async function() {
            if (!AdController) {
                tg.showAlert("Ad network failed to load. Please refresh.");
                return;
            }

            claimBtn.disabled = true;
            claimBtn.innerText = "Loading Ad...";

            // Trigger the Adsgram Ad
            AdController.show().then(async (result) => {
                // Promise resolved: User watched the whole ad
                const newTicket = Math.floor(100000 + Math.random() * 900000).toString(); 
                userTickets.push(newTicket);
                lastClaimTime = Date.now();

                // Save to Firestore
                const docRef = doc(db, "users", userId);
                await updateDoc(docRef, {
                    tickets: userTickets,
                    lastClaimTime: lastClaimTime
                });

                tg.showAlert(`Ticket ${newTicket} claimed successfully!`);
                renderTable();
                checkCooldown();

            }).catch((result) => {
                // Promise rejected: User skipped the ad or no ad was available
                if (result.error) {
                    tg.showAlert("Failed to load an ad. Please try again later.");
                } else {
                    tg.showAlert("You closed the ad early. No ticket awarded.");
                }
                checkCooldown(); // Reset button to normal state
            });
        };

        // Initialize App
        loadUserData();
    </script>

    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #000000);
            --btn-color: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #999999);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        h1, h2, h3, p { margin: 5px 0; text-align: left; }
        .title { font-size: 24px; font-weight: bold; }
        .timer { font-size: 16px; color: #ff3b30; font-weight: bold; }
        .prize { font-size: 20px; color: #34c759; font-weight: bold; }
        .spacer { height: 30px; }

        .table-container {
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid var(--hint-color);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid var(--hint-color); }
        th { background-color: rgba(0,0,0,0.05); position: sticky; top: 0; }

        .claim-btn {
            background-color: var(--btn-color);
            color: var(--btn-text);
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }

        .claim-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .cooldown-info { font-size: 12px; color: var(--hint-color); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 class="title" id="lottery-status">Daily Lottery</h1>
    <p class="timer" id="lottery-timer">Loading timer...</p>
    <p class="prize">Prize Pool: $1,000</p>
    
    <div class="spacer"></div>
    
    <h3>Your Ticket Numbers</h3>
    
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ticket Number</th>
                </tr>
            </thead>
            <tbody id="ticket-table-body">
                </tbody>
        </table>
    </div>

    <button id="claim-btn" class="claim-btn" onclick="claimTicket()" disabled>Loading...</button>
    <div class="cooldown-info" id="cooldown-msg">Connecting to server...</div>

</body>
</html>
