<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Ad Test</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src='//libtl.com/sdk.js' data-zone='10688536' data-sdk='show_10688536'></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
               background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000);
               display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; padding: 20px; text-align: center; border-radius: 12px; 
                background: var(--tg-theme-secondary-bg-color, #f0f0f0); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        button { background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff);
                 border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        #log { margin-top: 20px; font-size: 14px; color: #888; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Telegram Ad Test</h3>
        <p>Click below to test the <b>Rewarded Popup</b>.</p>
        <button id="adBtn">Watch Ad for Reward</button>
        <div id="log">Status: Ready</div>
    </div>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Make the app full height

        const logDiv = document.getElementById('log');
        const btn = document.getElementById('adBtn');

        function updateLog(msg, isError = false) {
            logDiv.innerText = "Status: " + msg;
            logDiv.style.color = isError ? "#e53935" : "#43a047";
            console.log(msg);
        }

        btn.addEventListener('click', () => {
            updateLog("Loading ad...");
            
            // Monetag Call
            show_10688536('pop').then(() => {
                updateLog("Ad success! Reward user now.");
                tg.HapticFeedback.notificationOccurred('success');
            }).catch(e => {
                updateLog("Ad error or closed early.", true);
                tg.HapticFeedback.notificationOccurred('error');
            });
        });
    </script>
</body>
</html>
