<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RichAds Telegram Test</title>

<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- RichAds Telegram Script -->
<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

</head>

<body style="font-family:sans-serif;text-align:center;margin-top:40px;">

<h2>RichAds Telegram Mini App Test</h2>

<button onclick="loadAds()" style="padding:15px 30px;font-size:18px;">
Watch Ad
</button>

<p id="status"></p>

<script>

let adsReady = false;

function initAds(){
    window.TelegramAdsController = new TelegramAdsController();

    window.TelegramAdsController.initialize({
        pubId: "1004311",   // replace with your pubId
        appId: "6445"
    });

    adsReady = true;
    document.getElementById("status").innerText = "Ads Initialized";
}

function loadAds(){
    if(!adsReady){
        document.getElementById("status").innerText = "Ads not ready yet";
        return;
    }

    try{
        window.TelegramAdsController.showAd();
        document.getElementById("status").innerText = "Loading Ad...";
    }catch(e){
        document.getElementById("status").innerText = "Ad Error";
        console.log(e);
    }
}

window.onload = function(){
    if(window.Telegram?.WebApp){
        Telegram.WebApp.ready();
    }
    initAds();
}

</script>

</body>
</html>
