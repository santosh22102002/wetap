<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LOTTERY</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap" rel="stylesheet">

<style>

body{
background:#2C2C2C;
font-family:'Roboto',sans-serif;
color:#ffffff;
margin:0;
padding:20px;
text-transform:uppercase;
}

.header{
color:#F8FF13;
font-size:22px;
margin-bottom:20px;
}

.timer{
color:#F8FF13;
margin-top:8px;
}

.jackpot{
color:#F8FF13;
margin-top:5px;
}

.ticketCounter{
margin-top:20px;
}

.grid{
margin-top:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
max-height:300px;
overflow-y:auto;
}

.ticket{
padding:6px 0;
}

.rules{
margin-top:30px;
}

.rulesContent{
display:none;
margin-top:10px;
font-size:12px;
line-height:18px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#F8FF13;
color:#2C2C2C;
text-align:center;
padding:16px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
LOTTERY
<div class="timer" id="timer"></div>
<div class="jackpot" id="jackpot">JACKPOT ₹0</div>
</div>

<div class="ticketCounter" id="ticketCounter">
YOUR TICKETS: 0 / 138
</div>

<div class="grid" id="ticketGrid"></div>

<div class="rules">

<div onclick="toggleRules()">RULES</div>

<div class="rulesContent" id="rulesContent">

1 TICKET EVERY 10 MINUTES  
MAXIMUM 138 TICKETS PER DAY  

CLAIM PHASE  
00:00 - 23:00  

DRAW TIME  
23:01  

WINNER SELECTED RANDOMLY  
BASED ON NUMBER OF TICKETS  

WINNER RECEIVES TELEGRAM MESSAGE  

</div>

</div>

<div class="bottom" id="claimButton">
LOADING
</div>

<script>

////////////////////////////
//// TELEGRAM INIT
////////////////////////////

const tg = window.Telegram.WebApp;
tg.expand();

const telegramUser = tg.initDataUnsafe.user;
  if (!telegramUser) {
  alert("OPEN THIS APP INSIDE TELEGRAM");
}

const uid = String(telegramUser.id);

const username = telegramUser.username || "user";

////////////////////////////
//// FIREBASE CONFIG
////////////////////////////

const firebaseConfig = {
apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
authDomain: "upwebapp-19b3a.firebaseapp.com",
projectId: "upwebapp-19b3a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

////////////////////////////
//// DATE HELPERS
////////////////////////////

function getToday(){

return new Date().toISOString().split("T")[0];

}

////////////////////////////
//// DOM
////////////////////////////

const timer = document.getElementById("timer");
const jackpot = document.getElementById("jackpot");
const ticketGrid = document.getElementById("ticketGrid");
const ticketCounter = document.getElementById("ticketCounter");
const claimButton = document.getElementById("claimButton");

////////////////////////////
//// RULE TOGGLE
////////////////////////////

function toggleRules(){

const r = document.getElementById("rulesContent");

r.style.display = r.style.display==="block" ? "none":"block";

}

////////////////////////////
//// RANDOM TICKET
////////////////////////////

function generateTicket(){

return Math.floor(Math.random()*900000)+100000;

}

////////////////////////////
//// APP STATE
////////////////////////////

let userData=null;
let lotteryData=null;

////////////////////////////
//// REALTIME LISTENER USER
////////////////////////////

async function initUser(){

const ref = db.collection("users").doc(uid);

const doc = await ref.get();

if(!doc.exists){

await ref.set({

ticketsToday:0,
tickets:[],
nextClaimTime:0,
lastClaimDate:getToday(),
telegramID:telegramUser.id,
username:username

});

}

ref.onSnapshot(snapshot=>{

userData = snapshot.data();

updateUserUI();

});

}

initUser();

////////////////////////////
//// REALTIME LOTTERY
////////////////////////////

db.collection("lottery")
.doc(getToday())
.onSnapshot(doc=>{

if(!doc.exists) return;

lotteryData=doc.data();

updateLotteryUI();

});

////////////////////////////
//// UPDATE USER UI
////////////////////////////

function updateUserUI(){

ticketCounter.innerText=
"YOUR TICKETS: "+userData.ticketsToday+" / 138";

appendTickets();

updateButton();

}

////////////////////////////
//// APPEND TICKETS
////////////////////////////

let rendered=0;

function appendTickets(){

const tickets=userData.tickets;

for(let i=rendered;i<tickets.length;i++){

const div=document.createElement("div");

div.className="ticket";

div.innerText=tickets[i];

ticketGrid.appendChild(div);

}

rendered=tickets.length;

}

////////////////////////////
//// UPDATE LOTTERY UI
////////////////////////////

function updateLotteryUI(){

jackpot.innerText="JACKPOT ₹"+lotteryData.prizeAmount;

}

////////////////////////////
//// TIMER LOOP
////////////////////////////

setInterval(()=>{

const now=new Date();

const end=new Date();
end.setHours(23,0,0,0);

const diff=end-now;

if(diff>0){

const h=Math.floor(diff/3600000);
const m=Math.floor(diff%3600000/60000);
const s=Math.floor(diff%60000/1000);

timer.innerText="ENDS IN "+h+":"+m+":"+s;

}else{

timer.innerText="DRAWING IN PROGRESS";

}

updateButton();

},1000);

////////////////////////////
//// BUTTON STATE
////////////////////////////

function updateButton(){

if(!userData||!lotteryData) return;

const now=Date.now();

if(lotteryData.status!=="claim"){

claimButton.innerText="DRAWING IN PROGRESS";

return;

}

if(userData.ticketsToday>=138){

claimButton.innerText="DAILY LIMIT REACHED";

return;

}

if(now<userData.nextClaimTime){

const diff=userData.nextClaimTime-now;

const m=Math.floor(diff/60000);
const s=Math.floor(diff%60000/1000);

claimButton.innerText="NEXT TICKET IN "+m+":"+s;

return;

}

claimButton.innerText="CLAIM TICKET (WATCH AD)";

}

////////////////////////////
//// CLAIM TICKET
////////////////////////////

claimButton.onclick=async()=>{

if(!userData||!lotteryData) return;

const now=Date.now();

if(now<userData.nextClaimTime) return;

if(userData.ticketsToday>=138) return;

if(lotteryData.status!=="claim") return;

const ticket=generateTicket();

await db.collection("users").doc(uid).update({

ticketsToday:userData.ticketsToday+1,

tickets:firebase.firestore.FieldValue.arrayUnion(ticket),

nextClaimTime:Date.now()+600000,

lastClaimDate:getToday()

});

};

</script>

</body>
</html>
