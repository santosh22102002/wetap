<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { background:#0f172a; color:white; font-family:sans-serif; padding:10px;}
input { width:60%; padding:10px;}
button { padding:8px; margin:3px;}
.card { padding:10px; border-bottom:1px solid #333; cursor:pointer;}
video { width:100%; margin-top:10px;}
</style>
</head>

<body>

<h2>Anime 🎬</h2>

<input id="q" placeholder="Search anime">
<button onclick="search()">Search</button>
<button onclick="showFav()">❤️ Fav</button>

<div id="results"></div>
<div id="episodes"></div>
<div id="player"></div>

<script>
let API = "https://partially-frog-visibility-lynn.trycloudflare.com"; // replace this

// SEARCH
async function search() {
  let q = document.getElementById("q").value;

  let res = await fetch(`${API}/search?q=${q}`);
  let data = await res.json();

  let html = "";
  data.forEach(a => {
    html += `<div class="card" onclick="loadEpisodes('${a.title}', ${a.id})">
      ${a.title}
      <button onclick="addFav('${a.title}')">❤️</button>
    </div>`;
  });

  document.getElementById("results").innerHTML = html;
}

// LOAD EPISODES
async function loadEpisodes(title, id) {
  let res = await fetch(`${API}/episodes?anime_id=${id}`);
  let data = await res.json();

  let html = "<h3>Episodes</h3>";
  data.forEach(ep => {
    html += `<button onclick="play('${title}', ${ep.ep})">${ep.ep}</button>`;
  });

  document.getElementById("episodes").innerHTML = html;
}

// PLAY
async function play(title, ep) {
  let res = await fetch(`${API}/play?title=${title}&ep=${ep}`);
  let data = await res.json();

  document.getElementById("player").innerHTML =
    `<video id="v" controls autoplay src="${data.url}"></video>`;

  localStorage.setItem("last", JSON.stringify({title, ep}));

  setTimeout(() => {
    let v = document.getElementById("v");
    v.onended = () => play(title, ep + 1);
  }, 1000);
}

// FAVORITES
function addFav(title) {
  let favs = JSON.parse(localStorage.getItem("fav") || "[]");
  if (!favs.includes(title)) {
    favs.push(title);
    localStorage.setItem("fav", JSON.stringify(favs));
  }
}

function showFav() {
  let favs = JSON.parse(localStorage.getItem("fav") || "[]");

  let html = "<h3>Favorites</h3>";
  favs.forEach(f => {
    html += `<div class="card" onclick="searchFav('${f}')">${f}</div>`;
  });

  document.getElementById("results").innerHTML = html;
}

function searchFav(name) {
  document.getElementById("q").value = name;
  search();
}

// AUTO HISTORY
window.onload = () => {
  let last = JSON.parse(localStorage.getItem("last") || "{}");
  if (last.title) {
    play(last.title, last.ep);
  }
};
</script>

</body>
</html>
