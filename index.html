<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RichAds Telegram Mini App Test</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- RichAds Telegram SDK -->
<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  margin-top:120px;
}
button{
  padding:15px 30px;
  font-size:18px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>RichAds Playable Ads Test</h2>

<button onclick="showAd()">Watch Ad</button>

<script>

Telegram.WebApp.ready();
Telegram.WebApp.expand();

window.TelegramAdsController = new TelegramAdsController();

window.TelegramAdsController.initialize({
  pubId: "1004311",
  appId: "6445"
});

function showAd(){
  window.TelegramAdsController.showAd()
  .then(() => {
      alert("Ad watched successfully!");
  })
  .catch(() => {
      alert("Ad failed or not available.");
  });
}

</script>

</body>
</html>
