<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMA Supabase Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        button { width: 100%; padding: 12px; margin-top: 10px; border: none; border-radius: 8px; background: #0088cc; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-size: 0.9rem; color: #555; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Telegram & Supabase</h3>
        <p>User: <span id="user-name">Loading...</span></p>
        <p>ID: <span id="user-id">-</span></p>
        <button onclick="saveToSupabase()">Save to Database</button>
        <div id="status">Ready to test...</div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://bmimlksvqowgqoqheyin.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJtaW1sa3N2cW93Z3FvcWhleWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTY1OTUsImV4cCI6MjA4ODQ5MjU5NX0.VMv_LDdHbnZt2eZ1cWOmvZnyTn2beLeFgR5kPt5HzSI';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const tg = window.Telegram.WebApp;

        // Initialize Telegram UI
        tg.ready();
        tg.expand();

        // Get user data from Telegram
        const user = tg.initDataUnsafe?.user;

        if (user) {
            document.getElementById('user-name').innerText = user.username || user.first_name;
            document.getElementById('user-id').innerText = user.id;
        } else {
            document.getElementById('status').innerText = "❌ Not running inside Telegram";
        }

        async function saveToSupabase() {
            if (!user) return alert("No user data found!");
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "⏳ Saving...";

            const { data, error } = await supabase
                .from('telegram_users')
                .upsert({ 
                    id: user.id, 
                    username: user.username,
                    first_name: user.first_name,
                    last_name: user.last_name
                });

            if (error) {
                console.error(error);
                statusDiv.innerText = "❌ Error: " + error.message;
            } else {
                statusDiv.innerText = "✅ Successfully saved to Supabase!";
                tg.HapticFeedback.notificationOccurred('success');
            }
        }
    </script>
</body>
</html>
