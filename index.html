<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"; // <-- Added Auth

        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = { apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8", projectId: "upwebapp-19b3a" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app); // <-- Initialize Auth

        // Telegram Setup
        const tg = window.Telegram.WebApp;
        tg.expand();
        const tgUserId = tg.initDataUnsafe?.user?.id?.toString() || "DEV_USER";
        const tgUsername = tg.initDataUnsafe?.user?.username || "Unknown";
        
        let firebaseUid = null; // We will get this after login
        let todayStr = new Date().toISOString().split("T")[0];
        let state = { tickets: 0, max: 138, nextClaim: 0, status: "claim", prize: 0, winner: null };
        let timerInterval;

        const elJackpot = document.getElementById("jackpot-amount");
        const elTimer = document.getElementById("timer-text");
        const elTicketCount = document.getElementById("ticket-count");
        const elGrid = document.getElementById("ticket-grid");
        const btnClaim = document.getElementById("btn-claim");
        
        const listenData = () => {
            onSnapshot(doc(db, "lottery", todayStr), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    state.status = data.status;
                    state.prize = data.prizeAmount;
                    state.winner = data.winnerUID;
                    elJackpot.innerText = `$${state.prize}`;
                    updateUI();
                }
            });

            // Use the secure Firebase UID to read the document
            onSnapshot(doc(db, "users", firebaseUid), (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.data();
                    if (data.lastClaimDate !== todayStr) {
                        state.tickets = 0;
                        state.nextClaim = 0;
                        elGrid.innerHTML = "";
                    } else {
                        while(elGrid.children.length < data.ticketsToday) {
                            const tDiv = document.createElement("div");
                            tDiv.className = "ticket-box";
                            tDiv.innerText = elGrid.children.length + 1;
                            elGrid.appendChild(tDiv);
                        }
                        state.tickets = data.ticketsToday;
                        state.nextClaim = data.nextClaimTime ? data.nextClaimTime.toMillis() : 0;
                    }
                }
                elTicketCount.innerText = `YOUR TICKETS: ${state.tickets} / ${state.max}`;
                updateUI();
            });
        };

        const updateUI = () => {
            clearInterval(timerInterval);
            if (state.status === "claim") {
                timerInterval = setInterval(() => {
                    const now = new Date();
                    const drawTime = new Date();
                    drawTime.setHours(23, 0, 0, 0);
                    
                    if (now >= drawTime) {
                        elTimer.innerText = "DRAWING IN PROGRESS";
                        btnClaim.innerText = "DRAWING IN PROGRESS";
                        btnClaim.disabled = true;
                        clearInterval(timerInterval);
                    } else {
                        const diff = drawTime - now;
                        elTimer.innerText = new Date(diff).toISOString().substr(11, 8);
                        
                        if (state.tickets >= state.max) {
                            btnClaim.innerText = "DAILY LIMIT REACHED";
                            btnClaim.disabled = true;
                        } else if (now.getTime() < state.nextClaim) {
                            const coolDiff = state.nextClaim - now.getTime();
                            btnClaim.innerText = `NEXT TICKET IN ${new Date(coolDiff).toISOString().substr(14, 5)}`;
                            btnClaim.disabled = true;
                        } else {
                            btnClaim.innerText = "CLAIM TICKET (WATCH AD)";
                            btnClaim.disabled = false;
                        }
                    }
                }, 1000);
            } else if (state.status === "closed") {
                elTimer.innerText = "DRAWING IN PROGRESS";
                btnClaim.innerText = "DRAWING IN PROGRESS";
                btnClaim.disabled = true;
            } else if (state.status === "completed") {
                elTimer.innerText = `DRAW COMPLETED. WINNER: ${state.winner === tgUserId ? "YOU!" : "ANNOUNCED SOON"}`;
                if (state.winner === tgUserId) {
                     Array.from(elGrid.children).forEach(el => el.classList.add('winner'));
                }
                timerInterval = setInterval(() => {
                    const now = new Date();
                    const nextMidnight = new Date();
                    nextMidnight.setHours(24, 0, 0, 0);
                    const diff = nextMidnight - now;
                    btnClaim.innerText = `NEXT ROUND STARTS IN ${new Date(diff).toISOString().substr(11, 8)}`;
                }, 1000);
                btnClaim.disabled = true;
            }
        };

        btnClaim.addEventListener("click", async () => {
            if (btnClaim.disabled) return;
            btnClaim.disabled = true;
            btnClaim.innerText = "PROCESSING...";

            // Use the secure Firebase UID to write the document
            const userRef = doc(db, "users", firebaseUid);
            try {
                if (state.tickets === 0) {
                    await setDoc(userRef, {
                        telegramId: tgUserId, // <-- Save Telegram ID so the bot can DM them later
                        username: tgUsername,
                        ticketsToday: 1,
                        lastClaimDate: todayStr,
                        nextClaimTime: new Date(Date.now() + 10 * 60000)
                    });
                } else {
                    await updateDoc(userRef, {
                        ticketsToday: increment(1),
                        nextClaimTime: new Date(Date.now() + 10 * 60000)
                    });
                }
                await updateDoc(doc(db, "lottery", todayStr), { prizeAmount: increment(10) }); 
            } catch (err) {
                console.error("Claim failed", err);
                tg.showAlert("Claim failed. Please check your connection.");
                updateUI();
            }
        });

        document.getElementById("rules-toggle").addEventListener("click", () => {
            const content = document.getElementById("rules-content");
            content.style.display = content.style.display === "none" ? "block" : "none";
        });

        // SECURE LOGIN FLOW
        signInAnonymously(auth).then((userCredential) => {
            firebaseUid = userCredential.user.uid; // Get secure ID
            listenData(); // Start the app
        }).catch((error) => {
            console.error("Auth Error:", error);
            tg.showAlert("Secure connection failed. Please restart the app.");
        });
    </script>
    <style>
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; text-transform: uppercase; font-weight: bold; margin: 0; padding: 0; }
        body { background-color: #2C2C2C; color: #FFFFFF; display: flex; flex-direction: column; height: 100vh; padding-bottom: 80px; }
        .header-card { background-color: #3D3D3D; padding: 20px; text-align: center; border-bottom: 2px solid #F8FF13; }
        .text-accent { color: #F8FF13; }
        .header-title { font-size: 24px; margin-bottom: 10px; }
        .timer, .jackpot { font-size: 20px; }
        
        .counter-section { text-align: center; padding: 15px; font-size: 18px; }
        
        .grid-container { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); max-width: 100%; gap: 10px; align-content: start; justify-content: center; }
        @media (min-width: 350px) { .grid-container { grid-template-columns: repeat(4, 1fr); } }
        
        .ticket-box { background-color: #444; border: 1px solid #F8FF13; border-radius: 8px; padding: 15px 0; text-align: center; font-size: 16px; color: #F8FF13; }
        .ticket-box.winner { background-color: #F8FF13; color: #2C2C2C; animation: blink 1s infinite alternate; }
        
        .rules-section { padding: 15px; background: #222; border-top: 1px solid #444; }
        .rules-toggle { width: 100%; text-align: left; background: none; border: none; color: #F8FF13; font-size: 14px; cursor: pointer; padding: 5px 0; }
        .rules-content { font-size: 12px; color: #BBB; display: none; margin-top: 10px; line-height: 1.5; }

        .fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #2C2C2C; padding: 15px; border-top: 2px solid #444; }
        .btn-main { width: 100%; padding: 15px; background-color: #F8FF13; color: #2C2C2C; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: opacity 0.2s; }
        .btn-main:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="header-card">
        <div class="header-title text-accent">DAILY LOTTERY</div>
        <div class="timer text-accent" id="timer-text">00:00:00</div>
        <div class="jackpot text-accent" id="jackpot-amount">$0</div>
    </div>

    <div class="counter-section" id="ticket-count">YOUR TICKETS: 0 / 138</div>

    <div class="grid-container" id="ticket-grid"></div>

    <div class="rules-section">
        <button class="rules-toggle" id="rules-toggle">📖 RULES & INFO (TAP TO EXPAND)</button>
        <div class="rules-content" id="rules-content">
            • 1 TICKET EVERY 10 MINS.<br>
            • MAX 138 TICKETS/DAY.<br>
            • CLAIM ENDS AT 23:00 UTC.<br>
            • DRAW AT 23:01 UTC.<br>
            • WINNER NOTIFIED VIA BOT DM.<br>
            • BACK-TO-BACK WINNING PROHIBITED.
        </div>
    </div>

    <div class="fixed-bottom">
        <button class="btn-main" id="btn-claim" disabled>LOADING...</button>
    </div>

</body>
</html>
