<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Daily Lottery</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap');
    
    * {
      border: none !important;
      outline: none;
      box-sizing: border-box;
      font-family: 'Roboto', sans-serif;
      font-weight: bold;
      text-transform: uppercase;
    }

    body {
      background-color: #2C2C2C;
      color: #FFFFFF;
      margin: 0;
      padding: 0 0 80px 0;
      overflow-x: hidden;
    }

    .accent-text { color: #F8FF13; }
    
    .header-card {
      padding: 20px;
      text-align: center;
      background-color: #2C2C2C;
    }
    
    .lottery-title { font-size: 24px; margin-bottom: 10px; }
    .timer { font-size: 20px; margin-bottom: 5px; }
    .jackpot { font-size: 28px; }

    .ticket-counter {
      padding: 10px 20px;
      font-size: 16px;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 10px 20px;
      max-height: 40vh;
      overflow-y: auto;
    }

    .ticket {
      background-color: #3C3C3C;
      padding: 15px 5px;
      text-align: center;
      font-size: 14px;
    }

    .ticket.winner {
      background-color: #F8FF13;
      color: #2C2C2C;
    }

    details {
      margin: 20px;
      background-color: #3C3C3C;
    }
    summary {
      padding: 15px;
      cursor: pointer;
      color: #F8FF13;
      list-style: none;
    }
    summary::-webkit-details-marker { display: none; }
    .rules-content {
      padding: 15px;
      font-size: 12px;
      line-height: 1.5;
    }

    .bottom-button {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 70px;
      background-color: #F8FF13;
      color: #2C2C2C;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bottom-button:disabled {
      background-color: #555555;
      color: #888888;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="header-card">
    <div class="lottery-title accent-text">Daily Jackpot</div>
    <div id="status-display" class="timer accent-text">LOADING...</div>
    <div class="jackpot accent-text">PRIZE: <span id="prize-amount">0</span></div>
  </div>

  <div class="ticket-counter">YOUR TICKETS: <span id="user-tickets">0</span> / 138</div>
  <div class="ticket-grid" id="ticket-grid"></div>

  <details>
    <summary>HOW TO PLAY</summary>
    <div class="rules-content">
      - 1 TICKET EVERY 10 MINUTES<br>
      - MAX 138 TICKETS PER DAY<br>
      - CLAIM PHASE: 00:00 - 23:00<br>
      - DRAW TIME: 23:01<br>
      - WINNER NOTIFIED VIA BOT DM
    </div>
  </details>

  <button id="action-btn" class="bottom-button" disabled>LOADING...</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const tg = window.Telegram.WebApp;
    tg.expand();
    const user = tg.initDataUnsafe?.user || { id: "test_user" }; 

    // ✅ ADD YOUR FIREBASE PUBLIC CONFIG HERE
    const firebaseConfig = {
      apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
  authDomain: "upwebapp-19b3a.firebaseapp.com",
  databaseURL: "https://upwebapp-19b3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "upwebapp-19b3a",
  storageBucket: "upwebapp-19b3a.firebasestorage.app",
  messagingSenderId: "746730266775",
  appId: "1:746730266775:web:ae3ef6b81d83cd9427c9d2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const statusDisplay = document.getElementById('status-display');
    const prizeAmount = document.getElementById('prize-amount');
    const userTickets = document.getElementById('user-tickets');
    const ticketGrid = document.getElementById('ticket-grid');
    const actionBtn = document.getElementById('action-btn');

    let currentDateStr = new Date().toISOString().split('T')[0]; 
    let lotteryState = { status: 'claim', winnerTicket: null };
    let userState = { ticketsToday: 0, nextClaimTime: 0 };
    let timerInterval = null;

    const lotteryRef = ref(db, `lottery/${currentDateStr}`);
    const userRef = ref(db, `users/${user.id}`);

    onValue(lotteryRef, (snapshot) => {
      if (snapshot.exists()) {
        lotteryState = snapshot.val();
        prizeAmount.innerText = lotteryState.prizeAmount || 0;
        updateUI();
      }
    });

    onValue(userRef, (snapshot) => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        if (data.lastClaimDate === currentDateStr) {
          userState = data;
        } else {
          userState = { ticketsToday: 0, nextClaimTime: 0 }; 
        }
        renderTickets();
        updateUI();
      }
    });

    function updateUI() {
      clearInterval(timerInterval);
      const now = Date.now();
      const currentHour = new Date().getHours();
      
      if (currentHour >= 23 && lotteryState.status === 'claim') {
        statusDisplay.innerText = "DRAWING IN PROGRESS";
        setButtonState("DRAWING IN PROGRESS", true);
        return;
      }

      if (lotteryState.status === 'completed') {
        statusDisplay.innerText = `DRAW COMPLETED. WINNER TICKET: #${lotteryState.winnerTicket || 'NONE'}`;
        highlightWinner();
        startNextRoundTimer();
        return;
      }

      if (lotteryState.status === 'claim') {
        if (userState.ticketsToday >= 138) {
          statusDisplay.innerText = "MAX TICKETS REACHED";
          setButtonState("DAILY LIMIT REACHED", true);
        } else if (now < userState.nextClaimTime) {
          startCooldownTimer(userState.nextClaimTime);
        } else {
          startCountdownTo23();
          setButtonState("CLAIM TICKET (WATCH AD)", false);
        }
      }
    }

    function renderTickets() {
      ticketGrid.innerHTML = '';
      userTickets.innerText = userState.ticketsToday;
      for (let i = 1; i <= userState.ticketsToday; i++) {
        const div = document.createElement('div');
        div.className = 'ticket';
        div.innerText = `#${i}`;
        div.id = `ticket-${i}`;
        ticketGrid.appendChild(div);
      }
      highlightWinner();
    }

    function highlightWinner() {
      if (lotteryState.status === 'completed' && lotteryState.winnerUID === user.id) {
        const winningEl = document.getElementById(`ticket-${lotteryState.winnerTicket}`);
        if (winningEl) winningEl.classList.add('winner');
      }
    }

    function setButtonState(text, disabled) {
      actionBtn.innerText = text;
      actionBtn.disabled = disabled;
    }

    function formatTime(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600).toString().padStart(2, '0');
      const m = Math.floor((totalSec % 3600) / 60).toString().padStart(2, '0');
      const s = (totalSec % 60).toString().padStart(2, '0');
      return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
    }

    function startCooldownTimer(targetTime) {
      timerInterval = setInterval(() => {
        const remain = targetTime - Date.now();
        if (remain <= 0) {
          updateUI();
        } else {
          setButtonState(`NEXT TICKET IN ${formatTime(remain)}`, true);
          statusDisplay.innerText = "WAITING FOR COOLDOWN";
        }
      }, 1000);
    }

    function startCountdownTo23() {
      timerInterval = setInterval(() => {
        const now = new Date();
        const target = new Date();
        target.setHours(23, 0, 0, 0);
        const remain = target.getTime() - now.getTime();
        
        if (remain <= 0) {
          updateUI();
        } else {
          statusDisplay.innerText = `CLOSES IN ${formatTime(remain)}`;
        }
      }, 1000);
    }

    function startNextRoundTimer() {
      timerInterval = setInterval(() => {
        const now = new Date();
        const target = new Date();
        target.setDate(now.getDate() + 1);
        target.setHours(0, 0, 0, 0);
        const remain = target.getTime() - now.getTime();
        setButtonState(`NEXT ROUND STARTS IN ${formatTime(remain)}`, true);
      }, 1000);
    }

    actionBtn.addEventListener('click', () => {
      const now = Date.now();
      const nextTime = now + (10 * 60 * 1000); 

      runTransaction(userRef, (currentUser) => {
        if (!currentUser || currentUser.lastClaimDate !== currentDateStr) {
          return { ticketsToday: 1, nextClaimTime: nextTime, lastClaimDate: currentDateStr };
        }
        if (currentUser.ticketsToday < 138 && now >= currentUser.nextClaimTime) {
          currentUser.ticketsToday += 1;
          currentUser.nextClaimTime = nextTime;
          return currentUser;
        }
        return; 
      });
    });
  </script>
</body>
</html>
