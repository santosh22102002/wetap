<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Paper Lottery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --paper-bg: #fdf6e3; --ink-blue: #2c3e50; --accent-red: #e74c3c; }
        body { margin: 0; padding: 20px; font-family: 'Courier New', Courier, monospace; background-color: var(--paper-bg); color: var(--ink-blue); }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--paper-bg); display: flex; justify-content: center; align-items: center; z-index: 1000; font-weight: bold; }
        .lottery-title { font-size: 24px; font-weight: 900; text-align: left; }
        .timer-display { font-size: 16px; color: var(--accent-red); margin: 5px 0; text-align: left; }
        .prize-amount { font-size: 20px; margin-bottom: 20px; text-align: left; }
        #ticket-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; width: 100%; }
        .ticket-cell { font-size: 8px; text-align: center; padding: 6px 0; background: rgba(0,0,0,0.05); }
        .footer { position: fixed; bottom: 30px; left: 20px; right: 20px; }
        #claimBtn { background: var(--ink-blue); color: white; border: none; width: 100%; padding: 15px; font-family: inherit; font-size: 18px; }
        #claimBtn:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div id="loader">INITIALIZING...</div>

    <div class="lottery-title">DAILY GRAND LOTTERY</div>
    <div class="timer-display" id="status-text">CONNECTING...</div>
    <div class="prize-amount">JACKPOT: $1,000</div>

    <div style="height: 30px;"></div>
    <div style="font-weight: bold; margin-bottom: 10px;">YOUR TICKETS (<span id="count">0</span>/50)</div>
    
    <div id="ticket-grid"></div>

    <div class="footer">
        <button id="claimBtn" onclick="startAdFlow()">CLAIM TICKET</button>
        <div id="cd-timer" style="text-align: center; font-size: 12px; margin-top: 10px;"></div>
    </div>

    <script>
        // --- CONFIG & STATE ---
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
  authDomain: "upwebapp-19b3a.firebaseapp.com",
  databaseURL: "https://upwebapp-19b3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "upwebapp-19b3a",
  storageBucket: "upwebapp-19b3a.firebasestorage.app",
  messagingSenderId: "746730266775",
  appId: "1:746730266775:web:6ebf4d939b4a628c27c9d2",
  measurementId: "G-PBW98E4FTG"
};

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const tg = window.Telegram.WebApp;
        tg.ready();
// If the version is very old, you might want to force an update check
console.log("WebApp Version:", tg.version);
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "test_user";

        let isLotteryOpen = false;
        let cooldownEndTime = 0;

        // --- FUNCTIONS (Defined before calling) ---

        function initGrid() {
            const grid = document.getElementById('ticket-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 50; i++) {
                const cell = document.createElement('div');
                cell.className = 'ticket-cell';
                cell.id = `t-${i}`;
                cell.innerText = '------';
                grid.appendChild(cell);
            }
        }

        function syncData() {
            // 1. Lottery Status
            db.collection('lottery_system').doc('current').onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    isLotteryOpen = (data.status === "OPEN");
                    document.getElementById('status-text').innerText = isLotteryOpen ? "STATUS: OPEN" : "STATUS: CLOSED";
                }
            });

            // 2. User Tickets
            db.collection('users').doc(userId).collection('tickets').orderBy('timestamp', 'asc').onSnapshot((snap) => {
                document.getElementById('count').innerText = snap.size;
                snap.docs.forEach((doc, i) => {
                    const cell = document.getElementById(`t-${i}`);
                    if (cell) { cell.innerText = doc.data().number; cell.style.color = 'red'; }
                });
                document.getElementById('loader').style.display = 'none';
            });

            // 3. Cooldown
            db.collection('users').doc(userId).onSnapshot((doc) => {
                if (doc.exists && doc.data().lastClaimTime) {
                    cooldownEndTime = doc.data().lastClaimTime + (10 * 60 * 1000);
                }
            });
        }

       async function startAdFlow() {
    // Helper to handle alerts on old Telegram versions
    const safeAlert = (msg) => {
        if (tg.isVersionAtLeast('6.2')) {
            tg.showAlert(msg);
        } else {
            alert(msg);
        }
    };

    // Check if Adsgram library is loaded
    if (typeof window.Adsgram === 'undefined') {
        safeAlert("Ad network not ready. Please refresh.");
        return;
    }

    if (!isLotteryOpen) {
        safeAlert("Lottery is currently closed!");
        return;
    }

    // Replace 'YOUR_BLOCK_ID' with your actual AdsGram ID
    const AdController = window.Adsgram.init({ blockId: "YOUR_BLOCK_ID" });

    try {
        const result = await AdController.show();
        if (result.done) {
            safeAlert("Success! Ticket processed.");
        }
    } catch (e) {
        console.error("AdsGram Error:", e);
        if (e.error === 'no_fill') {
            safeAlert("No ads available. Try again later.");
        } else {
            safeAlert("Ad failed to load.");
        }
    }
}

        function runTimer() {
            const now = Date.now();
            const btn = document.getElementById('claimBtn');
            const cdDisplay = document.getElementById('cd-timer');

            if (now < cooldownEndTime) {
                const diff = Math.ceil((cooldownEndTime - now) / 1000);
                btn.disabled = true;
                cdDisplay.innerText = `Wait: ${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,'0')}`;
            } else {
                btn.disabled = !isLotteryOpen;
                cdDisplay.innerText = isLotteryOpen ? "Ready!" : "Closed";
            }
        }

        // --- STARTUP LOGIC ---
        initGrid();
        auth.signInAnonymously().then(() => {
            syncData();
            setInterval(runTimer, 1000);
            tg.expand();
        }).catch(err => {
            document.getElementById('loader').innerText = "AUTH FAILED: " + err.message;
        });

    </script>
</body>
</html>
