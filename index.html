<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Lottery</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-functions-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap');
        * {
            box-sizing: border-box;
            text-transform: uppercase;
            font-family: 'Roboto', sans-serif;
            font-weight: bold;
            border: none;
            outline: none;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #2C2C2C;
            color: #FFFFFF;
            padding-bottom: 80px; /* Space for bottom button */
        }
        /* Color Overrides */
        .primary-color { color: #F8FF13; }
        .bg-primary { background-color: #F8FF13; }
        .text-dark { color: #2C2C2C; }

        /* UI Structure */
        #header-card {
            text-align: center;
            padding: 20px;
            margin-bottom: 10px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; }
        #timer, #jackpot { font-size: 20px; margin: 5px 0; }
        
        #ticket-counter {
            text-align: center;
            font-size: 16px;
            margin: 20px 0 10px 0;
        }

        /* Ticket Grid */
        #ticket-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 15px;
            max-height: 40vh;
            overflow-y: auto;
        }
        .ticket {
            background-color: #444;
            padding: 15px 5px;
            text-align: center;
            font-size: 14px;
            border-radius: 4px;
        }
        .ticket.winner {
            background-color: #F8FF13;
            color: #2C2C2C;
        }

        /* Rules Section */
        #rules-section {
            padding: 15px;
            margin-top: 20px;
        }
        #rules-header {
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        #rules-content {
            display: none;
            font-size: 12px;
            color: #AAA;
            line-height: 1.5;
        }
        #rules-content.active { display: block; }

        /* Bottom Button */
        #fixed-bottom-btn {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
        }
        #fixed-bottom-btn:disabled {
            background-color: #666;
            color: #999;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="header-card">
        <h1 class="primary-color">DAILY LOTTERY</h1>
        <div id="timer" class="primary-color">LOADING...</div>
        <div id="jackpot" class="primary-color">PRIZE: 0</div>
    </div>

    <div id="ticket-counter">YOUR TICKETS: 0 / 138</div>

    <div id="ticket-grid"></div>

    <div id="rules-section">
        <div id="rules-header" onclick="toggleRules()">
            <span>LOTTERY RULES</span>
            <span>▼</span>
        </div>
        <div id="rules-content">
            1. 1 TICKET EVERY 10 MINS.<br>
            2. MAX 138 TICKETS PER DAY.<br>
            3. CLAIM PHASE: 00:00 - 23:00 UTC.<br>
            4. DRAW TIME: 23:01 UTC.<br>
            5. WINNER DRAWN BY WEIGHTED RANDOM.<br>
            6. WINNER RECEIVES TELEGRAM DM.
        </div>
    </div>

    <button id="fixed-bottom-btn" class="bg-primary text-dark" onclick="handleClaim()" disabled>LOADING...</button>

    <script>
        // Initialize Firebase (Replace with your actual config)
        const firebaseConfig = {
           apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
  authDomain: "upwebapp-19b3a.firebaseapp.com",
  projectId: "upwebapp-19b3a",
  storageBucket: "upwebapp-19b3a.firebasestorage.app",
  messagingSenderId: "746730266775",
  appId: "1:746730266775:web:ae3ef6b81d83cd9427c9d2",
            // ...other config
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const functions = firebase.app().functions('Etc/UTC');

        // Telegram Web App Init
        const tg = window.Telegram.WebApp;
        tg.expand();
        // Fallback for local testing if tg.initDataUnsafe is empty
        const user = tg.initDataUnsafe?.user || { id: "123456", username: "TestUser" };

        let currentStatus = "claim";
        let nextClaimTime = 0;
        let ticketsToday = 0;
        let countdownInterval;

        // Ensure user is authenticated (Assume custom token auth handled prior, using anonymous for structure)
        firebase.auth().signInAnonymously().then(() => {
            initApp();
        });

        function initApp() {
            const todayStr = new Date().toISOString().split('T')[0];
            
            // 1. Listen to Global Lottery Doc
            db.collection('lottery').doc(todayStr).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    currentStatus = data.status;
                    document.getElementById('jackpot').innerText = `PRIZE: ${data.prizeAmount || 0}`;
                    
                    if(currentStatus === "completed" && data.winnerUID === user.id) {
                        highlightWinningTicket(data.winnerTicket);
                    }
                }
                updateUI();
            });

            // 2. Listen to User Doc
            db.collection('users').doc(user.id.toString()).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    if(data.lastClaimDate === todayStr) {
                        ticketsToday = data.ticketsToday || 0;
                        nextClaimTime = data.nextClaimTime ? data.nextClaimTime.toDate().getTime() : 0;
                        renderTickets(ticketsToday);
                    } else {
                        ticketsToday = 0;
                        nextClaimTime = 0;
                        renderTickets(0);
                    }
                }
                updateUI();
            });

            // 3. Start Global Timer
            countdownInterval = setInterval(updateUI, 1000);
        }

        function renderTickets(count) {
            document.getElementById('ticket-counter').innerText = `YOUR TICKETS: ${count} / 138`;
            const grid = document.getElementById('ticket-grid');
            grid.innerHTML = '';
            for(let i = 1; i <= count; i++) {
                const el = document.createElement('div');
                el.className = 'ticket';
                el.id = `ticket-${i}`;
                el.innerText = `#${i}`;
                grid.appendChild(el);
            }
        }

        function highlightWinningTicket(ticketNum) {
            const el = document.getElementById(`ticket-${ticketNum}`);
            if(el) el.classList.add('winner');
        }

        function updateUI() {
            const now = new Date();
            const btn = document.getElementById('fixed-bottom-btn');
            const timerEl = document.getElementById('timer');

            // Global Phase Check
            const hours = now.getUTCHours();
            
            if(currentStatus === "claim" && hours < 23) {
                // Countdown to 23:00 UTC
                const target = new Date(now);
                target.setUTCHours(23, 0, 0, 0);
                const diff = target - now;
                timerEl.innerText = formatTime(diff);
                timerEl.className = "primary-color";

                // Button State
                if (ticketsToday >= 138) {
                    btn.innerText = "DAILY LIMIT REACHED";
                    btn.disabled = true;
                    btn.className = "";
                } else if (nextClaimTime > now.getTime()) {
                    btn.innerText = `NEXT TICKET IN ${formatTime(nextClaimTime - now.getTime(), true)}`;
                    btn.disabled = true;
                    btn.className = "";
                } else {
                    btn.innerText = "CLAIM TICKET (WATCH AD)";
                    btn.disabled = false;
                    btn.className = "bg-primary text-dark";
                }
            } 
            else if (currentStatus === "completed") {
                timerEl.innerText = "DRAW COMPLETED";
                timerEl.className = "";
                
                // Countdown to 00:00 UTC next day
                const target = new Date(now);
                target.setUTCHours(24, 0, 0, 0);
                btn.innerText = `NEXT ROUND STARTS IN ${formatTime(target - now)}`;
                btn.disabled = true;
                btn.className = "";
            } 
            else {
                // Drawing in progress (23:00 - 23:01 or status == closed)
                timerEl.innerText = "DRAWING IN PROGRESS";
                timerEl.className = "";
                btn.innerText = "DRAWING IN PROGRESS";
                btn.disabled = true;
                btn.className = "";
            }
        }

        async function handleClaim() {
            // Watch Ad integration goes here
            const btn = document.getElementById('fixed-bottom-btn');
            btn.disabled = true;
            btn.innerText = "CLAIMING...";

            try {
                const claimFn = firebase.functions().httpsCallable('claimTicket');
                await claimFn({ username: user.username });
            } catch(e) {
                tg.showAlert(e.message.toUpperCase());
                updateUI();
            }
        }

        function toggleRules() {
            const content = document.getElementById('rules-content');
            content.classList.toggle('active');
        }

        function formatTime(ms, short = false) {
            if(ms < 0) return "00:00:00";
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            const pad = num => num.toString().padStart(2, '0');
            if(short && h === 0) return `${pad(m)}:${pad(s)}`;
            return `${pad(h)}:${pad(m)}:${pad(s)}`;
        }
    </script>
</body>
</html>
