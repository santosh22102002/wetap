<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>1UP Daily Lottery</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.container{
  max-width:380px;
  margin:auto;
  padding:10px;
}

.card{
  background:#1a1a1a;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  background:#ffd400;
  border:none;
  border-radius:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.ticket{
  background:#222;
  padding:8px;
  border-radius:6px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>1UP DAILY LOTTERY</h2>
<div id="timer">Loading...</div>
<div id="jackpot">₹0</div>
</div>

<div class="card">
<div>Your Tickets: <span id="count">0</span>/138</div>
<div id="tickets" class="grid"></div>
</div>

<div class="card">
<button id="claimBtn">CLAIM TICKET</button>
</div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getDatabase, ref, get, set, update, onValue, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import { getAuth, signInAnonymously } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
 apiKey: "AIzaSyA3-qDlnHoG2YlleWGfZy6wNBWkkNJ54x8",
  authDomain: "upwebapp-19b3a.firebaseapp.com",
  databaseURL: "https://upwebapp-19b3a-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "upwebapp-19b3a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let uid = null;

signInAnonymously(auth).then(async(res)=>{

uid = res.user.uid;
console.log("User:",uid);

createUser();

});

async function createUser(){

const userRef = ref(db,"users/"+uid);

const snap = await get(userRef);

if(!snap.exists()){

await set(userRef,{
username:"user",
ticketsToday:0,
nextClaimTime:0,
lastClaimDate:""
});

}

loadUser();

}

function loadUser(){

const userRef = ref(db,"users/"+uid);

onValue(userRef,(snap)=>{

const data = snap.val();

document.getElementById("count").innerText =
data.ticketsToday;

renderTickets(data.ticketsToday);

});

}

function renderTickets(n){

const grid = document.getElementById("tickets");

grid.innerHTML="";

for(let i=0;i<n;i++){

const d = document.createElement("div");
d.className="ticket";
d.innerText="T"+(i+1);

grid.appendChild(d);

}

}

document.getElementById("claimBtn")
.onclick = async ()=>{

const userRef = ref(db,"users/"+uid);

const snap = await get(userRef);

const user = snap.val();

if(user.ticketsToday >= 138){

alert("Limit reached");

return;

}

await update(userRef,{
ticketsToday:user.ticketsToday+1
});

};

</script>

</body>
</html>
